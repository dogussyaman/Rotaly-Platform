name: Feature request
description: Propose a product or engineering improvement.
title: '[Feature] '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Which user or engineering problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, API, or workflow.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and dependencies
      description: Note migrations, auth changes, content updates, or external dependencies.